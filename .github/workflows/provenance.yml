name: AI Provenance

on:
  pull_request:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  provenance:
    name: Verify provenance manifest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install cryptography
        run: pip install -r requirements-ci.txt

      - name: Fetch provenance notes from remote
        run: |
          echo "Remote provenance ref:"
          git ls-remote origin refs/notes/provenance
          git fetch --force origin +refs/notes/provenance:refs/notes/provenance
          echo "Notes after fetch:"
          git notes --ref=provenance list | tail -20

      - name: Verify provenance and build report
        id: verify
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            COMMIT="${{ github.event.pull_request.head.sha }}"
          else
            COMMIT="${{ github.sha }}"
          fi
          echo "Checking commit: $COMMIT"
          set +e
          python scripts/verify_provenance.py "$COMMIT" --output provenance-report.md
          EXIT_CODE=$?
          set -e
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          echo "commit=$COMMIT" >> "$GITHUB_OUTPUT"

      - name: Job summary
        if: always() && hashFiles('provenance-report.md') != ''
        run: cat provenance-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Comment on pull request
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.existsSync('provenance-report.md')
              ? fs.readFileSync('provenance-report.md', 'utf8')
              : '## AI Provenance Report\n\n❌ Report file missing.';
            const marker = '<!-- ai-provenance-report -->';
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo,
                comment_id: existing.id,
                body: report,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number,
                body: report,
              });
            }

      - name: Fail if verification failed
        if: steps.verify.outputs.exit_code != '0'
        run: |
          echo "::error::Provenance verification failed for ${{ steps.verify.outputs.commit }}"
          exit 1
